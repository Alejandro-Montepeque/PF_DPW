<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

    <!-- Navbar dinámico -->
    <div id="navbar-container"></div>

    <!-- Contenido principal -->
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1>Contáctenos</h1>
            <p>Puedes ponerte en contacto con nosotros a través de este formulario</p>
        </div>

        <form>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label" for="name">Ingresa tu nombre</label>
                        <input class="form-control" type="text" id="name" placeholder="Tu nombre*" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Ingresa tu correo electrónico</label>
                        <input class="form-control" type="email" id="email" placeholder="Tu correo*" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="phone">Ingresa tu teléfono</label>
                        <input class="form-control" type="tel" id="phone" placeholder="Tu teléfono*" />
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label" for="message">Ingresa tu mensaje</label>
                        <textarea class="form-control" id="message" rows="8" placeholder="Mensaje*" required></textarea>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-warning text-white fw-bold px-4">
                    Enviar mensaje
                </button>
            </div>
        </form>
    </div>

    <!-- Script para renderizar el navbar -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>

    <!-- Este es el script para configurar que el navbar se pinte en cada pantalla que este presente el div mencionado -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
